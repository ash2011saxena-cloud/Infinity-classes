<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Coaching</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#1e3a8a;color:white;text-align:center;padding:15px}
.container{padding:20px}
.hidden{display:none}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{padding:10px;margin:5px;border:none;background:#1e3a8a;color:white;border-radius:5px;cursor:pointer}
input{padding:8px;margin:5px;width:200px}
</style>
</head>
<body>

<header>
<h1>Infinity Coaching</h1>
<p>Contact: 9997886893</p>
</header>

<div class="container" id="loginPage">
<h2>Student Login</h2>
<input type="text" id="username" placeholder="Enter ID"><br>
<input type="password" id="password" placeholder="Enter Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="container hidden" id="dashboard">
<h2>Welcome Student</h2>
<button onclick="showClass('9')">Class 9</button>
<button onclick="showClass('10')">Class 10</button>
<button onclick="showClass('11')">Class 11</button>
<button onclick="showClass('12')">Class 12</button>
<div id="content"></div>
</div>

<div class="container hidden" id="adminPanel">
<h2>Admin Panel</h2>
<input id="newUser" placeholder="Student ID">
<input id="newPass" placeholder="Password">
<button onclick="addUser()">Add Student</button>
<div id="userList"></div>
</div>

<script>
let users = {
  "student1":"1234",
  "student2":"1234"
};

function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;

if(u==="admin" && p==="admin123"){
 document.getElementById('loginPage').classList.add('hidden');
 document.getElementById('adminPanel').classList.remove('hidden');
 loadUsers();
}
else if(users[u]===p){
 document.getElementById('loginPage').classList.add('hidden');
 document.getElementById('dashboard').classList.remove('hidden');
}
else{
 alert("Invalid Login");
}
}

function showClass(cls){
let content=document.getElementById('content');
content.innerHTML=`
<div class='card'>
<h3>Class ${cls} Courses</h3>
<p>📘 Notes PDF (Upload later)</p>
<p>🎥 Video Lecture (Coming soon)</p>
</div>

<div class='card'>
<h3>Test</h3>
<p>Q1: 5 + 5 = ?</p>
<input id='ans'>
<button onclick='checkAnswer()'>Submit</button>
</div>`;
}

function checkAnswer(){
let ans=document.getElementById('ans').value;
if(ans==10){alert("Correct");}
else{alert("Wrong");}
}

function addUser(){
let u=document.getElementById('newUser').value;
let p=document.getElementById('newPass').value;
users[u]=p;
loadUsers();
}

function loadUsers(){
let list="";
for(let u in users){
 list += `<p>${u} : ${users[u]}</p>`;
}
document.getElementById('userList').innerHTML=list;
}
</script>

</body>
</html>
